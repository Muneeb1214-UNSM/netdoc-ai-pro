<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDoc AI Pro | Launch Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --dark: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Animated Background */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        /* The Animated Launch Button */
        .launch-btn {
            position: relative;
            display: inline-block;
            padding: 18px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #00f2ff, #0062ff);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .launch-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.7);
            letter-spacing: 2px;
        }

        .launch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .launch-btn:hover::before {
            left: 100%;
        }

        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 3rem;
        }

        .feature-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            font-size: 0.9rem;
            color: var(--cyan);
        }

        .footer-text {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="blob"></div>
    
    <div class="container">
        <h1 class="title">NETDOC AI PRO</h1>
        <p class="subtitle">
            Autonomous Cyber-Medical Diagnostic Agent & Forensic Suite. 
            Experience the future of intelligent network troubleshooting with real-time AI analysis.
        </p>

        <a href="https://net-sentry-pro-jhqqohnuvevxr9qfnd8hug.streamlit.app/" target="_blank" class="launch-btn">
            🚀 Launch Project
        </a>

        <div class="features">
            <div class="feature-tag">Neural Diagnostics</div>
            <div class="feature-tag">Forensic Audit</div>
            <div class="feature-tag">AI Predictions</div>
        </div>
    </div>

    <div class="footer-text">
        DEVELOPED BY [YOUR NAME] | UNIVERSITY SEMESTER PROJECT
    </div>

    <script>
        // Simple cursor tracking for background effect
        document.addEventListener('mousemove', (e) => {
            const blob = document.querySelector('.blob');
            const x = e.clientX;
            const y = e.clientY;
            blob.style.left = x - 250 + 'px';
            blob.style.top = y - 250 + 'px';
        });
    </script>
</body>
</html>
